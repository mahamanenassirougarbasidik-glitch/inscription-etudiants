name: Tests Python

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v3

    - name: Configurer Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Installer les dépendances
      run: pip install -r requirements.txt

    # Ajout du répertoire courant au PYTHONPATH pour que 'src' soit trouvable
    - name: Lancer les tests avec couverture
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest --cov=src

    # Optionnel : afficher la couverture
    - name: Afficher le rapport de couverture
      run: coverage report