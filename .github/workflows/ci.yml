name: Tests Python

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Lister les fichiers (débogage)
        run: ls -la

      - name: Afficher le répertoire courant
        run: pwd

      - name: Configurer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérifier l'import du module src
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -c "from src.gestion_inscriptions import GestionInscriptions; print('Import réussi')"

      - name: Lancer les tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=src