name: CI - Tests et Qualité du Code

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Tests Unitaires
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
    
    - name: Configuration de Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-django coverage
    
    - name: Vérification des migrations
      run: |
        python manage.py makemigrations --check --dry-run
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        DJANGO_SETTINGS_MODULE: config.settings
    
    - name: Exécution des tests unitaires
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term-missing
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        DJANGO_SETTINGS_MODULE: config.settings
    
    - name: Upload de la couverture vers Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    name: Analyse de Code (Linting)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
    
    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Installation des outils de linting
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort pylint
    
    - name: Vérification avec Black (formatage)
      run: black --check .
      continue-on-error: true
    
    - name: Vérification avec isort (imports)
      run: isort --check-only .
      continue-on-error: true
    
    - name: Vérification avec Flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Analyse avec Pylint
      run: |
        pip install -r requirements.txt
        pylint **/*.py --exit-zero --output-format=text
      continue-on-error: true

  security:
    name: Analyse de Sécurité
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4
    
    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Installation de Safety et Bandit
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Vérification des vulnérabilités (Safety)
      run: |
        pip install -r requirements.txt
        safety check --json
      continue-on-error: true
    
    - name: Analyse de sécurité du code (Bandit)
      run: bandit -r . -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Upload du rapport Bandit
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  build-success:
    name: Build Réussi ✅
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: success()
    
    steps:
    - name: Confirmation du succès
      run: |
        echo "✅ Tous les tests sont passés avec succès !"
        echo "✅ Le code respecte les standards de qualité"
        echo "✅ Aucune vulnérabilité critique détectée"
