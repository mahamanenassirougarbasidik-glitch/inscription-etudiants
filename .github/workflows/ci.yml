name: Tests Python

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]

    steps:
    - uses: actions/checkout@v3

    - name: Afficher la structure complète
      run: |
        echo "=== Contenu racine ==="
        ls -la
        echo "=== Contenu de src/ ==="
        ls -la src/ || echo "src/ n'existe pas"
        echo "=== Contenu de tests/ ==="
        ls -la tests/ || echo "tests/ n'existe pas"

    - name: Afficher le contenu des fichiers clés
      run: |
        echo "=== requirements.txt ==="
        cat requirements.txt || echo "requirements.txt manquant"
        echo "=== setup.py ==="
        cat setup.py || echo "setup.py manquant"

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Installer le package
      run: pip install -e .

    - name: Tester l'import
      run: |
        python -c "
import sys
print('PYTHONPATH:', sys.path)
try:
    from src.gestion_inscriptions import GestionInscriptions
    print('✅ Import réussi')
except Exception as e:
    print('❌ Erreur d import:', e)
    sys.exit(1)
"

    - name: Lancer les tests
      run: pytest --cov=src -v