name: Tests Python

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]

    steps:
      - uses: actions/checkout@v3

      - name: Afficher la structure du projet
        run: ls -R

      - name: Afficher le répertoire courant
        run: pwd

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérifier le PYTHONPATH et l'import
        run: |
          echo "PYTHONPATH avant : $PYTHONPATH"
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          echo "PYTHONPATH après : $PYTHONPATH"
          python -c "import sys; print('Chemins Python :', sys.path); from src.gestion_inscriptions import GestionInscriptions; print('✅ Import réussi')"

      - name: Lancer les tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=src -v