# Configuration Pytest pour le projet inscription-etudiants

[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Chemins de recherche des tests
testpaths = .
pythonpath = .

# Options de base
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    --cov-branch
    --no-cov-on-fail

# Markers personnalisés
markers =
    slow: tests qui prennent du temps à s'exécuter
    integration: tests d'intégration
    unit: tests unitaires
    database: tests nécessitant la base de données
    
# Couverture de code
[coverage:run]
source = .
omit = 
    */migrations/*
    */tests/*
    */test_*.py
    */__init__.py
    */venv/*
    */env/*
    manage.py
    */settings.py
    */wsgi.py
    */asgi.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
